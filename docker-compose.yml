services:
  mysql:
    image: mysql:8.4
    container_name: cofrefy-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cofrefy}
      MYSQL_USER: ${MYSQL_USER:-cofrefy_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cofrefy_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - cofrefy_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cofrefy_mysql_data:
